<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDOM Snowflake ハンズオン 構成図</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f8fafc; color: #1e293b; overflow-x: auto; }

  .header { text-align: center; padding: 36px 20px 12px; }
  .header h1 { font-size: 26px; color: #0f172a; }
  .header h1 span { background: linear-gradient(135deg, #0ea5e9, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { color: #64748b; margin-top: 6px; font-size: 13px; }

  .timeline { display: flex; justify-content: center; gap: 6px; padding: 16px 20px; flex-wrap: wrap; }
  .timeline-item {
    padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.3s; border: 2px solid transparent; white-space: nowrap;
  }
  .timeline-item:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .timeline-item.active { border-color: #334155; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }

  .legend { display: flex; justify-content: center; gap: 24px; padding: 8px 20px 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #64748b; font-weight: 500; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  .canvas { position: relative; width: 1340px; min-height: 620px; margin: 0 auto; padding: 20px 30px; }

  .col-label {
    position: absolute; top: 0; font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: #94a3b8; writing-mode: vertical-rl; text-orientation: mixed;
  }

  .node {
    position: absolute; border-radius: 14px; padding: 14px 16px; cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; transform: scale(0.85);
    min-width: 150px; text-align: center; backdrop-filter: blur(4px);
  }
  .node.visible { opacity: 1; transform: scale(1); }
  .node:hover { transform: scale(1.06); z-index: 10; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
  .node h3 { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
  .node p { font-size: 10px; opacity: 0.7; line-height: 1.4; }
  .node .icon { font-size: 22px; margin-bottom: 4px; }

  .schema-raw { background: #e0f2fe; border: 2px solid #38bdf8; color: #0c4a6e; box-shadow: 0 3px 12px rgba(56,189,248,0.15); }
  .schema-mart { background: #ede9fe; border: 2px solid #a78bfa; color: #3b0764; box-shadow: 0 3px 12px rgba(167,139,250,0.15); }
  .schema-agent { background: #fee2e2; border: 2px solid #f87171; color: #7f1d1d; box-shadow: 0 3px 12px rgba(248,113,113,0.15); }
  .schema-app { background: #fef3c7; border: 2px solid #fbbf24; color: #78350f; box-shadow: 0 3px 12px rgba(251,191,36,0.15); }

  svg.arrows { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  svg.arrows path { fill: none; stroke-width: 2.5; opacity: 0; transition: opacity 0.5s 0.3s; }
  svg.arrows path.visible { opacity: 0.55; }
  svg.arrows polygon { opacity: 0; transition: opacity 0.5s 0.3s; }
  svg.arrows polygon.visible { opacity: 0.7; }
  svg.arrows .arrow-label { font-size: 10px; font-weight: 600; opacity: 0; transition: opacity 0.5s 0.3s; }
  svg.arrows .arrow-label.visible { opacity: 1; }

  .detail-panel {
    position: fixed; right: -420px; top: 0; width: 400px; height: 100vh;
    background: #fff; border-left: 2px solid #e2e8f0; padding: 30px; box-shadow: -4px 0 20px rgba(0,0,0,0.08);
    transition: right 0.3s; z-index: 100; overflow-y: auto;
  }
  .detail-panel.open { right: 0; }
  .detail-panel h2 { font-size: 18px; color: #0ea5e9; margin-bottom: 12px; }
  .detail-panel .close { position: absolute; top: 12px; right: 14px; cursor: pointer; font-size: 22px; color: #94a3b8; background: none; border: none; }
  .detail-panel .close:hover { color: #475569; }
  .detail-panel table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .detail-panel td { padding: 8px 10px; font-size: 12px; border-bottom: 1px solid #f1f5f9; }
  .detail-panel td:first-child { color: #64748b; font-weight: 600; width: 90px; }
  .detail-panel .desc { font-size: 13px; color: #475569; line-height: 1.7; margin-bottom: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1><span>IDOM Snowflake ハンズオン</span> 構成図</h1>
  <p>中古車販売データを使った データパイプライン → AI Agent の構築フロー（左→右）</p>
</div>

<div class="timeline" id="timeline"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#38bdf8"></div>RAW_DATA</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>DATA_MART</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>Streamlit</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>AGENTS</div>
</div>

<div class="canvas" id="canvas">
  <svg class="arrows" id="arrows">
    <defs>
      <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#38bdf8"/></marker>
      <marker id="ah-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/></marker>
      <marker id="ah-yellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/></marker>
      <marker id="ah-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f87171"/></marker>
    </defs>
  </svg>
</div>

<div class="detail-panel" id="detail">
  <button class="close" onclick="closeDetail()">&#x2715;</button>
  <h2 id="detail-title"></h2>
  <div class="desc" id="detail-desc"></div>
  <table id="detail-table"></table>
</div>

<script>
const steps = [
  { id: 'all', label: '全体', color: '#64748b' },
  { id: 'setup', label: '0. Setup', color: '#0ea5e9' },
  { id: 'dt', label: '1. Dynamic Table', color: '#8b5cf6' },
  { id: 'ai', label: '2. AI SQL', color: '#a855f7' },
  { id: 'st', label: '4. Streamlit', color: '#f59e0b' },
  { id: 'cs', label: '5. Cortex Search', color: '#8b5cf6' },
  { id: 'ag', label: '6. Agent', color: '#ef4444' },
];

const COL1 = 30, COL2 = 320, COL3 = 620, COL4 = 920, COL5 = 1140;
const ROW_A = 30, ROW_B = 180, ROW_C = 340, ROW_D = 490;

const nodes = [
  { id: 'stores',    label: 'STORES',              sub: '50店舗',           icon: '🏪', cls: 'schema-raw',  steps: ['all','setup','dt'],     x: COL1, y: ROW_A },
  { id: 'contracts', label: 'CONTRACTS',            sub: '1,150件',          icon: '📝', cls: 'schema-raw',  steps: ['all','setup','dt'],     x: COL1, y: ROW_B },
  { id: 'insurance', label: 'INSURANCE',            sub: '625件',            icon: '🛡️', cls: 'schema-raw',  steps: ['all','setup','dt'],     x: COL1, y: ROW_C },
  { id: 'activity',  label: 'ACTIVITY_LOGS',        sub: '400件 (JSON)',     icon: '📋', cls: 'schema-raw',  steps: ['all','setup','ai','cs'],x: COL1, y: ROW_D },

  { id: 'dt_sales',  label: 'DT_SALES\n_PERFORMANCE', sub: 'Dynamic Table',   icon: '⚡', cls: 'schema-mart', steps: ['all','dt','st','ag'], x: COL2, y: ROW_B },
  { id: 'v_activity',label: 'V_ACTIVITY_LOGS',      sub: 'View (JSON展開)',  icon: '👁️', cls: 'schema-mart', steps: ['all','ai'],             x: COL2, y: ROW_D },


  { id: 'ai_funcs',  label: 'Cortex AI\nFunctions',  sub: '6関数体験',       icon: '🧠', cls: 'schema-mart', steps: ['all','ai'],             x: COL3, y: ROW_D },

  { id: 'sv',        label: 'SV_SALES\n_PERFORMANCE', sub: 'Semantic View',   icon: '🏷️', cls: 'schema-mart', steps: ['all','ag'],             x: COL3, y: ROW_B },
  { id: 'chunks',    label: 'SEARCH_CHUNKS',         sub: 'チャンク化',       icon: '✂️', cls: 'schema-mart', steps: ['all','cs'],             x: COL3, y: ROW_C },

  { id: 'streamlit', label: 'Streamlit App',         sub: '売上ダッシュボード', icon: '📊', cls: 'schema-app',  steps: ['all','st'],             x: COL4, y: ROW_A },
  { id: 'search',    label: 'ACTIVITY\n_SEARCH',     sub: 'Cortex Search',    icon: '🔍', cls: 'schema-mart', steps: ['all','cs','ag'],        x: COL4, y: ROW_C },

  { id: 'agent',     label: 'IDOM_SALES\n_AGENT',    sub: 'Cortex Agent\n2ツール構成', icon: '🤖', cls: 'schema-agent', steps: ['all','ag'], x: COL5, y: ROW_B },
];

const arrows = [
  { from: 'stores',    to: 'dt_sales',  steps: ['all','dt'], color: '#38bdf8', marker: 'ah-blue',   label: 'JOIN' },
  { from: 'contracts', to: 'dt_sales',  steps: ['all','dt'], color: '#38bdf8', marker: 'ah-blue',   label: '' },
  { from: 'insurance', to: 'dt_sales',  steps: ['all','dt'], color: '#38bdf8', marker: 'ah-blue',   label: '' },
  { from: 'activity',  to: 'v_activity',steps: ['all','ai'], color: '#a78bfa', marker: 'ah-purple', label: 'FLATTEN' },
  { from: 'v_activity',to: 'ai_funcs',  steps: ['all','ai'], color: '#a78bfa', marker: 'ah-purple', label: 'AI分析' },
  { from: 'dt_sales',  to: 'streamlit', steps: ['all','st'], color: '#fbbf24', marker: 'ah-yellow', label: 'データソース' },
  { from: 'activity',  to: 'chunks',    steps: ['all','cs'], color: '#a78bfa', marker: 'ah-purple', label: 'チャンク化' },
  { from: 'chunks',    to: 'search',    steps: ['all','cs'], color: '#a78bfa', marker: 'ah-purple', label: 'インデックス' },
  { from: 'dt_sales',  to: 'sv',        steps: ['all','ag'], color: '#f87171', marker: 'ah-red',    label: '意味付け' },
  { from: 'sv',        to: 'agent',     steps: ['all','ag'], color: '#f87171', marker: 'ah-red',    label: 'Tool 1' },
  { from: 'search',    to: 'agent',     steps: ['all','ag'], color: '#f87171', marker: 'ah-red',    label: 'Tool 2' },
];

const details = {
  stores:     { title: 'STORES テーブル',          desc: '店舗マスタ。東京・大阪・名古屋・仙台など全国50店舗のデータ。目標売上・目標契約件数も保持。', props: [['スキーマ','RAW_DATA'],['件数','50行'],['主キー','STORE_ID'],['主要カラム','STORE_NAME, REGION, PREFECTURE, STORE_TYPE']] },
  contracts:  { title: 'CONTRACTS テーブル',        desc: '契約データ。車種・契約金額・ローン・契約ステータス（納車済/手続中/キャンセル）を管理。', props: [['スキーマ','RAW_DATA'],['件数','1,150行'],['主キー','CONTRACT_ID'],['主要カラム','CONTRACT_PRICE, LOAN_AMOUNT, CONTRACT_STATUS']] },
  insurance:  { title: 'INSURANCE テーブル',        desc: '保険付帯データ。契約に紐づく保険種別・保険料を管理。', props: [['スキーマ','RAW_DATA'],['件数','625行'],['主キー','INSURANCE_ID'],['主要カラム','INSURANCE_TYPE, PREMIUM_AMOUNT']] },
  activity:   { title: 'ACTIVITY_LOGS テーブル',    desc: '商談活動履歴。VARIANT型のJSON形式で格納された半構造化データ。電話メモ、メール、LINE対話、来店記録など。', props: [['スキーマ','RAW_DATA'],['件数','400行'],['形式','VARIANT (JSON)'],['種別','電話/メール/LINE/来店/社内メモ']] },
  dt_sales:   { title: 'DT_SALES_PERFORMANCE',      desc: 'Dynamic Table。STORES x CONTRACTS x INSURANCE を結合し、店舗別・月別のKPIを自動集計。target_lag=1時間。', props: [['スキーマ','DATA_MART'],['種別','Dynamic Table'],['target_lag','1 hour'],['結合','3テーブルJOIN + GROUP BY']] },
  v_activity: { title: 'V_ACTIVITY_LOGS ビュー',    desc: 'ACTIVITY_LOGSのJSON(VARIANT)をFLATTEN展開するビュー。AI SQL Functions の入力データとして使用。', props: [['スキーマ','DATA_MART'],['種別','View'],['ソース','ACTIVITY_LOGS'],['操作','JSON → カラム展開']] },
  ai_funcs:   { title: 'Cortex AI Functions',        desc: '6つのAI SQL関数を体験: SENTIMENT, CLASSIFY_TEXT, EXTRACT_ANSWER, TRANSLATE, SUMMARIZE, COMPLETE。', props: [['SENTIMENT','感情分析 (-1~1)'],['CLASSIFY_TEXT','テキスト分類'],['EXTRACT_ANSWER','質問応答'],['TRANSLATE','翻訳'],['SUMMARIZE','要約'],['COMPLETE','LLM自由生成']] },
  streamlit:  { title: 'Streamlit App',               desc: 'Cortex Codeを使って売上ダッシュボードを構築。グラフ・テーブル・フィルタを実装。', props: [['種別','Streamlit in Snowflake'],['ツール','Cortex Code'],['データ','DT_SALES_PERFORMANCE'],['内容','売上ダッシュボード']] },
  chunks:     { title: 'ACTIVITY_SEARCH_CHUNKS',      desc: '活動履歴をCortex Search用にチャンク化したテーブル。', props: [['スキーマ','DATA_MART'],['種別','Table'],['ソース','ACTIVITY_LOGS'],['用途','Cortex Search入力']] },
  search:     { title: 'ACTIVITY_SEARCH',              desc: 'Cortex Search Service。活動履歴の全文検索を提供。顧客名・車種・ステータス等で絞り込み可能。', props: [['スキーマ','DATA_MART'],['種別','Cortex Search Service'],['REFRESH','INCREMENTAL'],['検索対象','商談活動履歴テキスト']] },
  sv:         { title: 'SV_SALES_PERFORMANCE',         desc: 'Semantic View。Dynamic Tableにfacts/dimensions/metricsを付与し、AIが自然言語→SQL変換できるようにする。', props: [['スキーマ','DATA_MART'],['種別','Semantic View'],['facts','12項目'],['dimensions','6項目'],['metrics','3項目']] },
  agent:      { title: 'IDOM_SALES_AGENT',             desc: '2ツール構成のCortex Agent。構造化データ(Semantic View)と非構造化データ(Cortex Search)を統合した営業分析AI。', props: [['スキーマ','AGENTS'],['種別','Cortex Agent'],['Tool 1','sales_performance_analyst (Semantic View)'],['Tool 2','activity_search (Cortex Search)'],['用途','営業意思決定支援']] },
};

let currentStep = 'all';

function initTimeline() {
  const tl = document.getElementById('timeline');
  steps.forEach(s => {
    const el = document.createElement('div');
    el.className = 'timeline-item' + (s.id === 'all' ? ' active' : '');
    el.style.background = s.color + '18';
    el.style.color = s.color;
    el.textContent = s.label;
    el.onclick = () => setStep(s.id);
    el.id = 'tl-' + s.id;
    tl.appendChild(el);
  });
}

function setStep(id) {
  currentStep = id;
  document.querySelectorAll('.timeline-item').forEach(e => e.classList.remove('active'));
  document.getElementById('tl-' + id).classList.add('active');
  renderNodes();
  setTimeout(renderArrows, 120);
}

function renderNodes() {
  const canvas = document.getElementById('canvas');
  canvas.querySelectorAll('.node').forEach(e => e.remove());
  nodes.forEach(n => {
    if (!n.steps.includes(currentStep)) return;
    const el = document.createElement('div');
    el.className = 'node ' + n.cls;
    el.style.left = n.x + 'px';
    el.style.top = n.y + 'px';
    el.innerHTML = '<div class="icon">' + n.icon + '</div><h3>' + n.label.replace(/\n/g,'<br>') + '</h3><p>' + n.sub.replace(/\n/g,'<br>') + '</p>';
    el.onclick = () => showDetail(n.id);
    el.dataset.nid = n.id;
    canvas.appendChild(el);
    requestAnimationFrame(() => el.classList.add('visible'));
  });
}

function getNodeEdge(id, side) {
  const canvas = document.getElementById('canvas');
  const el = canvas.querySelector('[data-nid="' + id + '"]');
  if (!el) return null;
  const r = el.getBoundingClientRect();
  const cr = canvas.getBoundingClientRect();
  const cx = r.left - cr.left + r.width / 2;
  const cy = r.top - cr.top + r.height / 2;
  if (side === 'right') return { x: r.left - cr.left + r.width, y: cy };
  if (side === 'left')  return { x: r.left - cr.left, y: cy };
  return { x: cx, y: cy };
}

function renderArrows() {
  const svg = document.getElementById('arrows');
  const defs = svg.querySelector('defs').outerHTML;
  svg.innerHTML = defs;
  arrows.forEach(a => {
    if (!a.steps.includes(currentStep)) return;
    setTimeout(() => {
      const from = getNodeEdge(a.from, 'right');
      const to = getNodeEdge(a.to, 'left');
      if (!from || !to) return;
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const cx1 = from.x + dx * 0.45;
      const cy1 = from.y;
      const cx2 = to.x - dx * 0.45;
      const cy2 = to.y;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', 'M' + from.x + ',' + from.y + ' C' + cx1 + ',' + cy1 + ' ' + cx2 + ',' + cy2 + ' ' + to.x + ',' + to.y);
      path.setAttribute('stroke', a.color);
      path.setAttribute('marker-end', 'url(#' + a.marker + ')');
      svg.appendChild(path);
      requestAnimationFrame(() => path.classList.add('visible'));
      if (a.label) {
        const mx = (from.x + to.x) / 2;
        const my = (from.y + to.y) / 2 - 10;
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', mx);
        text.setAttribute('y', my);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('class', 'arrow-label');
        text.setAttribute('fill', a.color);
        text.textContent = a.label;
        svg.appendChild(text);
        requestAnimationFrame(() => text.classList.add('visible'));
      }
    }, 150);
  });
}

function showDetail(id) {
  const d = details[id];
  if (!d) return;
  document.getElementById('detail-title').textContent = d.title;
  document.getElementById('detail-desc').textContent = d.desc;
  const table = document.getElementById('detail-table');
  table.innerHTML = d.props.map(function(p) { return '<tr><td>' + p[0] + '</td><td>' + p[1] + '</td></tr>'; }).join('');
  document.getElementById('detail').classList.add('open');
}
function closeDetail() { document.getElementById('detail').classList.remove('open'); }
document.addEventListener('click', function(e) {
  if (!e.target.closest('.detail-panel') && !e.target.closest('.node')) closeDetail();
});

initTimeline();
setStep('all');
window.addEventListener('resize', function() { renderNodes(); setTimeout(renderArrows, 120); });
</script>
</body>
</html>
